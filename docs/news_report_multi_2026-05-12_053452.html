<!DOCTYPE html>
<html lang="zh-CN" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Radar · 2026-05-12 | Renegade AI</title>
  <meta name="description" content="AI 资讯监控报告 · 0 高价值案例">
  
  <!-- 加载字体（谷歌字体）-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <!-- Font Awesome 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  
  <!-- 嵌入 CSS 样式 -->

    <style>
      /* ========== 颜色变量定义（浅色模式默认）========== */
      :root {
        --bg: #f8f9fc;              /* 页面背景 */
        --bg2: #ffffff;             /* 次要背景 */
        --surface: #f0f2f8;         /* 卡片/按钮背景 */
        --card: #ffffff;            /* 内容卡片背景 */
        --border: #e0e2ec;          /* 边框颜色 */
        --border-bright: #c0c2d0;   /* 高亮边框 */
        --text: #2a2a40;            /* 主要文字 */
        --text-muted: #6a6a80;      /* 次要文字 */
        --text-faint: #a0a0b8;      /* 弱化文字 */
        --accent: #e8503a;          /* 主强调色（橙红） */
        --accent-dim: rgba(232,80,58,0.08);  /* 强调色浅色背景 */
        --accent2: #b88c2a;         /* 次要强调色（金色） */
        --accent3: #3a7fbf;         /* 第三强调色（蓝色） */
        --accent3-dim: rgba(74,143,207,0.08);
        --white: #2a2a40;           /* "白色"文字（实际是深色） */
        
        /* 字体栈 */
        --mono: 'Space Mono', 'Courier New', monospace;    /* 等宽字体 */
        --serif: 'Crimson Pro', Georgia, serif;            /* 正文字体 */
        --display: 'Bebas Neue', 'Arial Narrow', sans-serif; /* 标题字体 */
      }

      /* ========== 深色模式覆盖 ========== */
      :root.dark-theme {
        --bg: #08080e;
        --bg2: #0d0d18;
        --surface: #111120;
        --card: #13131f;
        --border: #1e1e30;
        --border-bright: #2e2e50;
        --text: #cccce0;
        --text-muted: #6868a0;
        --text-faint: #3a3a5a;
        --accent: #e8503a;
        --accent-dim: rgba(232,80,58,0.12);
        --accent2: #c9a040;
        --accent3: #4a8fcf;
        --accent3-dim: rgba(74,143,207,0.1);
        --white: #f0f0f8;
      }

      /* ========== 全局重置 ========== */
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--serif);
        background: var(--bg);
        color: var(--text);
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;  /* 字体平滑 */
        transition: background-color 0.3s ease, color 0.3s ease;  /* 主题切换动画 */
      }

      /* ========== 顶部导航栏（固定定位）========== */
      nav {
        position: fixed; top: 0; width: 100%; z-index: 200;
        background: rgba(248,249,252,0.92);  /* 半透明背景 */
        backdrop-filter: blur(24px);          /* 毛玻璃效果 */
        border-bottom: 1px solid var(--border);
        height: 56px;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 32px;
        font-family: var(--mono);
        transition: background-color 0.3s ease, border-color 0.3s ease;
      }
      .dark-theme nav { background: rgba(8,8,14,0.92); }
      
      .nav-brand {
        font-size: 0.75rem; font-weight: 700;
        color: var(--accent); letter-spacing: 3px;
        text-transform: uppercase; text-decoration: none;
        transition: color 0.2s;
      }
      .nav-brand:hover { color: var(--accent2); }
      
      .nav-right { display: flex; gap: 12px; align-items: center; }
      
      /* 主题切换按钮 */
      .theme-toggle {
        background: none; border: 1px solid var(--border);
        color: var(--text-muted); width: 36px; height: 36px;
        border-radius: 0; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--accent); color: var(--accent);
        background: var(--accent-dim);
      }
      .theme-toggle i { font-size: 0.8rem; }

      /* ========== 主内容区 ========== */
      .main {
        max-width: 860px; margin: 0 auto;
        padding: 100px 32px 60px;  /* 顶部留白避开固定导航栏 */
      }

      /* 返回链接 */
      .back-link {
        font-family: var(--mono); font-size: 0.65rem;
        letter-spacing: 2px; color: var(--text-muted);
        text-decoration: none; text-transform: uppercase;
        border: 1px solid var(--border); padding: 6px 14px;
        display: inline-block; margin-bottom: 40px;
        transition: all .2s;
      }
      .back-link:hover { border-color: var(--accent); color: var(--accent); }

      /* 页面标题区域 */
      .page-eyebrow {
        font-family: var(--mono); font-size: 0.62rem;
        letter-spacing: 4px; color: var(--accent);
        text-transform: uppercase; margin-bottom: 8px;
        display: flex; align-items: center; gap: 10px;
      }
      .page-eyebrow::before {
        content: ''; width: 28px; height: 1px; background: var(--accent);
      }
      .page-title {
        font-family: var(--display); font-size: 3rem;
        letter-spacing: 2px; color: var(--white);
        margin-bottom: 6px; line-height: 1;
      }
      .page-sub {
        font-family: var(--mono); font-size: 0.65rem;
        color: var(--text-muted); letter-spacing: 1.5px;
        margin-bottom: 32px;
      }

      /* 统计行 */
      .stats-row {
        display: flex; gap: 24px; margin-bottom: 40px;
        font-family: var(--mono); font-size: 0.65rem;
        color: var(--text-muted); letter-spacing: 1px;
        flex-wrap: wrap;
      }
      .stats-row span { color: var(--accent); font-weight: 700; }
      
      /* ========== 紧急清单盒子 ========== */
      .urgent-box {
        background: var(--accent-dim); border: 1px solid var(--accent);
        padding: 20px 24px; margin-bottom: 32px;
        border-left: 4px solid var(--accent);
      }
      .urgent-title {
        font-family: var(--mono); font-size: 0.6rem;
        letter-spacing: 2px; color: var(--accent);
        text-transform: uppercase; margin-bottom: 12px;
        display: flex; align-items: center; gap: 8px;
      }
      .urgent-item {
        font-size: 0.9rem; margin-bottom: 8px;
        padding-left: 16px; border-left: 2px solid var(--border);
      }
      .urgent-item strong { color: var(--white); }
      .urgent-item a { color: var(--accent2); text-decoration: none; }
      .urgent-item a:hover { text-decoration: underline; }
      
      /* ========== 案例卡片 ========== */
      .card {
        background: var(--card); border: 1px solid var(--border);
        padding: 28px; margin-bottom: 16px;
        transition: border-color .2s, background 0.2s;
      }
      .card:hover { border-color: var(--accent); }  /* 悬停高亮 */
      
      .card-header {
        display: flex; justify-content: space-between;
        align-items: flex-start; margin-bottom: 14px; gap: 16px;
      }
      .card-title {
        font-family: var(--display); font-size: 1.3rem;
        letter-spacing: 0.5px; color: var(--white);
        line-height: 1.3; flex: 1;
      }
      .card-score {
        font-family: var(--display); font-size: 2rem;
        color: var(--accent); line-height: 1;
        white-space: nowrap; text-align: right;
      }
      .card-score span {
        font-family: var(--mono); font-size: 0.5rem;
        color: var(--text-muted); display: block;
        letter-spacing: 1px; margin-top: 4px;
      }
      
      /* 案例价值徽章 */
      .card-badge {
        display: inline-block; padding: 2px 8px;
        font-family: var(--mono); font-size: 0.55rem;
        letter-spacing: 1px; text-transform: uppercase;
        background: var(--accent3-dim); color: var(--accent3);
        border: 1px solid var(--accent3); margin-left: 8px;
      }
      .card-badge.high {
        background: var(--accent-dim); color: var(--accent);
        border-color: var(--accent);
      }
      
      /* 卡片元信息行 */
      .card-meta {
        font-family: var(--mono); font-size: 0.6rem;
        color: var(--text-faint); letter-spacing: 0.5px;
        margin-bottom: 12px; display: flex;
        gap: 16px; flex-wrap: wrap; align-items: center;
      }
      .card-meta a { color: var(--accent2); text-decoration: none; }
      .card-meta a:hover { text-decoration: underline; }
      
      .card-body {
        font-size: 0.92rem; color: var(--text-muted);
        line-height: 1.8; margin-bottom: 12px;
      }
      
      /* 理论关联引用块 */
      .card-implications {
        font-family: var(--mono); font-size: 0.68rem;
        color: var(--accent2); padding: 10px 14px;
        background: rgba(201,160,64,0.05);
        border-left: 2px solid var(--accent2);
        letter-spacing: 0.3px; margin-bottom: 12px;
      }
      
      /* 卡片底部标签 */
      .card-footer {
        display: flex; gap: 12px; flex-wrap: wrap;
        font-family: var(--mono); font-size: 0.58rem;
        color: var(--text-faint); letter-spacing: 0.5px;
        padding-top: 12px; border-top: 1px dashed var(--border);
      }
      .card-footer .tag {
        padding: 2px 6px; background: var(--surface);
        border-radius: 2px; color: var(--text-muted);
      }
      
      /* ========== 折叠区域（中相关资讯）========== */
      details {
        margin: 32px 0; border: 1px solid var(--border);
        background: var(--card); border-radius: 0;
      }
      summary {
        padding: 14px 20px; cursor: pointer;
        font-family: var(--mono); font-size: 0.65rem;
        letter-spacing: 1px; color: var(--text-muted);
        background: var(--surface); user-select: none;
        display: flex; align-items: center; gap: 8px;
      }
      summary:hover { color: var(--accent); }
      details[open] summary { border-bottom: 1px solid var(--border); }
      .collapsed-list { padding: 16px 20px; }
      .collapsed-list li {
        margin-bottom: 10px; font-size: 0.9rem;
        color: var(--text-muted);
      }
      .collapsed-list a { color: var(--text); text-decoration: none; }
      .collapsed-list a:hover { color: var(--accent); text-decoration: underline; }
      
      /* ========== 页脚 ========== */
      footer {
        margin-top: 48px; padding-top: 24px;
        border-top: 1px solid var(--border);
        font-family: var(--mono); font-size: 0.6rem;
        color: var(--text-muted); letter-spacing: 1px;
        display: flex; justify-content: space-between;
      }
      footer a { color: var(--text-muted); text-decoration: none; }
      footer a:hover { color: var(--accent); }
      
      /* ========== 移动端适配 ========== */
      @media (max-width: 600px) {
        .main { padding: 100px 16px 40px; }
        .page-title { font-size: 2.2rem; }
        .card-header { flex-direction: column; }
        .card-score { text-align: left; }
        .stats-row { flex-direction: column; gap: 8px; }
      }
    </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav>
    <a href="https://brook-han.github.io/Renegade-AI/" class="nav-brand">RENEGADE AI v5.3</a>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <i class="fa fa-sun-o" id="themeIcon"></i>
      </button>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main">
    <a href="index.html" class="back-link">← 返回主页</a>
    
    <div class="page-eyebrow">§ News Radar</div>
    <h1 class="page-title">DAILY INTELLIGENCE</h1>
    <p class="page-sub">2026-05-12 · Model: DeepSeek</p>
    
    <!-- 统计行 -->
    <div class="stats-row">
      <div>📊 分析条目: <span>0</span></div>
      <div>🔴 高价值: <span>0</span></div>
      <div>🟡 中相关: <span>4</span></div>
    </div>
    
    <!-- 紧急清单 + 案例卡片 -->
    
    
    
    <!-- 页脚 -->
    <footer>
      <span>Renegade AI v5.3 · Brooks Han</span>
      <a href="https://github.com/Brook-Han/renegade-ai-Updater" target="_blank" rel="noopener">GitHub ↗</a>
    </footer>
  </main>

  <!-- JavaScript：主题切换功能 -->
  <script>
    (function() {
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');
      const KEY = 'renegade-theme';
      
      // 应用主题的函数
      const apply = (theme) => {
        html.classList.toggle('dark-theme', theme === 'dark');
        icon.className = theme === 'dark' ? 'fa fa-moon-o' : 'fa fa-sun-o';
        localStorage.setItem(KEY, theme);  // 记住用户选择
      };
      
      // 初始化：优先用用户选择，否则跟随系统
      const pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      apply(localStorage.getItem(KEY) || pref);
      
      // 绑定点击事件
      toggle?.addEventListener('click', () => {
        apply(html.classList.contains('dark-theme') ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>
