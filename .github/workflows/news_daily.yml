name: News Radar Daily
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with: {fetch-depth: 0}

      - uses: actions/setup-python@v6
        with: {python-version: '3.10'}

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行雷达（抓取 + 分析 + 生成 MD + HTML）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --news

      - name: 生成存档索引页
        run: python generate_archive.py

      - name: 提交报告文件到 main 分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.md reports/*.html
          git commit -m "📰 Add daily news report and index" || true
          git push origin main

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports      # 只部署 reports 目录
          publish_branch: gh-pages
          keep_files: false
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 钉钉推送
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          REPORT_BASE_URL: "https://Brook-Han.github.io/renegade-ai-Updater"
        run: python notify_dingtalk.py --type news