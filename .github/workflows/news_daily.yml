name: News Radar Daily
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: '3.10'}
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 运行雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --news

      # ✅ 修复版：彻底清理脏文件，无冲突、零报错
      - name: 提交报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 🔥 核心修复：清空所有缓存/日志/本地修改（解决所有Git报错）
          git checkout -- . || true
          rm -f radar.log *.json logs/* __pycache__/* cache/* 2>/dev/null || true

          # 同步远程代码
          git pull --rebase origin main
          
          # 仅提交报告文件
          git add reports/news_*.md 2>/dev/null
          git commit -m "Add daily news report" || true
          
          # 安全推送
          git push origin main

      - name: 钉钉推送
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python notify_dingtalk.py --type news