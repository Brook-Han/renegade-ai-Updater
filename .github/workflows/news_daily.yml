name: News Radar Daily

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 ≈ 北京时间 10:00
  workflow_dispatch:

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # 拉取完整历史，方便 rebase

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行资讯雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --news

      - name: 提交并推送报告
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add reports/news_report_multi_*.md
          git commit -m "Daily news report" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main