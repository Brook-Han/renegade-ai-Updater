name: News Radar Daily

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行资讯雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --news

      - name: 提交并推送报告
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          # Stash 所有未跟踪的更改（例如缓存文件），否则后续 pull 会报错
          git stash push --include-untracked -m "temp-stash"

          # 拉取远程最新并变基
          git pull --rebase origin main

          # 恢复之前 stash 的缓存文件等
          git stash pop || true

          # 用 find 检测是否有新生成的资讯报告
          REPORT_FILES=$(find reports/ -maxdepth 1 -name "news_report_multi_*.md" 2>/dev/null)

          if [ -n "$REPORT_FILES" ]; then
              git add reports/news_report_multi_*.md
              git commit -m "Daily news report" || echo "No changes to commit"
          else
              echo "ℹ️ 没有匹配的报告文件，跳过提交"
          fi

          for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 10
          done

      - name: 推送紧急警报到钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          LATEST=$(ls -t reports/news_report_multi_*.md 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
              python notify_dingtalk.py "$LATEST"
          fi