name: News Radar Daily

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行资讯雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --news

      - name: 提交并推送报告
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          # 🔥 清空所有脏文件（缓存、日志），只留报告
          rm -f paper_cache.json radar.log
          git checkout -- . || true
          git pull origin main

          # 只提交报告
          if ls reports/news_report_multi_*.md 1> /dev/null 2>&1; then
              git add -f reports/news_report_multi_*.md
              git commit -m "Daily news report" || true
              git push origin main
          fi

      - name: 推送到钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python notify_dingtalk.py --type news