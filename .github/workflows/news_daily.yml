name: News Radar Daily

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行资讯雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --news

      - name: 提交并推送报告
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # 暂存无关更改
          git stash push -m "temp" || true
          git pull --rebase origin main
          git stash pop || true
          
          # 🔥 核心修复：强制添加被 .gitignore 忽略的报告文件
          REPORT_FILES=$(find reports/ -maxdepth 1 -name "news_report_multi_*.md" 2>/dev/null)
          if [ -n "$REPORT_FILES" ]; then
              git add -f reports/news_report_multi_*.md
              git commit -m "Daily news report" || echo "No changes to commit"
          else
              echo "ℹ️ 没有匹配的报告文件，跳过提交"
          fi
          
          # 重试推送
          for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 10
          done

      - name: 推送到钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python notify_dingtalk.py --type news