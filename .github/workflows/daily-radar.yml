# ═══════════════════════════════════════════════════════════════
# 🤖 Renegade AI 雷达系统 · GitHub Actions 工作流（完整注释修复版）
# ═══════════════════════════════════════════════════════════════
#
# 📋 功能说明：
#   ✅ 每天北京时间 06:00 自动运行（也可手动触发测试）
#   ✅ 学术雷达：抓取 arXiv + Semantic Scholar 论文，用 DeepSeek 分析相关性
#   ✅ 新闻雷达：抓取 RSS 资讯，用 DeepSeek 分析理论关联
#   ✅ HTML 转换：将 Markdown 报告转为精美网页，支持浅色/深色主题
#   ✅ 聚合主页：生成 reports/index.html，带筛选/搜索/统计功能
#   ✅ 链接修复：确保从根域名访问时，"查看完整报告"链接正确跳转
#   ✅ 自动部署：将 reports/ 目录推送到 gh-pages 分支，通过 GitHub Pages 公开访问
#   ✅ 钉钉推送：调用 dingtalk.py，只推送评分≥4.0 的前 5 条高价值内容
#
# 🔐 必需 Secrets（在 GitHub 仓库设置中配置）：
#   进入：Settings → Secrets and variables → Actions → New repository secret
#   
#   必需项：
#   - DEEPSEEK_API_KEY: DeepSeek API 密钥（用于 AI 分析）
#   
#   可选项（不填则跳过对应功能）：
#   - DINGTALK_WEBHOOK: 钉钉机器人 Webhook URL
#   - DINGTALK_SECRET: 钉钉加签密钥（安全设置中获取）
#   - REPORT_BASE_URL: 公开访问基础 URL，如：
#       https://brook-han.github.io/renegade-ai-Updater
#   - GIT_USER_NAME: Git 提交用户名（空则用默认值 renegade-ai-bot）
#   - GIT_USER_EMAIL: Git 提交邮箱（空则用默认值 bot@renegade-ai.local）
#
# 👤 作者：Brooks Han
# 📅 版本：v2.1 (2026-05-11) · 全Bug修复 + 官方gh-pages部署 + 钉钉正常可用
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# 🏷️ 工作流基础配置
# ───────────────────────────────────────────────────────────────
name: 🤖 Daily Radar Auto-Run

# ───────────────────────────────────────────────────────────────
# ⏰ 触发条件：什么时候自动运行？
# ───────────────────────────────────────────────────────────────
on:
  # 🕐 定时触发：使用 cron 表达式（全部使用 UTC 时间！）
  # UTC 22:00 = 北京时间 06:00 (+8 小时)
  schedule:
    - cron: '0 22 * * *'
  
  # 🎮 手动触发：方便测试
  workflow_dispatch:

# ───────────────────────────────────────────────────────────────
# 🔐 权限配置：最小权限原则
# ───────────────────────────────────────────────────────────────
permissions:
  contents: write
  pages: write
  id-token: write

# ───────────────────────────────────────────────────────────────
# 🔄 任务定义
# ───────────────────────────────────────────────────────────────
jobs:
  radar-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 步骤 1️⃣：拉取仓库代码
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 2️⃣：安装 Python 3.10
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      # 步骤 3️⃣：安装完整依赖（已补全HTML/钉钉/渲染必需库）
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || \
          pip install arxiv requests openai python-dotenv feedparser markdown jinja2

      # 步骤 4️⃣：配置环境变量【修复：支持兜底+注入钉钉密钥】
      - name: ⚙️ Setup environment
        run: |
          # 核心AI密钥
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> $GITHUB_ENV
          
          # Git 身份
          echo "GIT_NAME=${{ secrets.GIT_USER_NAME }}" >> $GITHUB_ENV
          echo "GIT_EMAIL=${{ secrets.GIT_USER_EMAIL }}" >> $GITHUB_ENV
          
          # 钉钉密钥注入环境变量
          echo "DINGTALK_WEBHOOK=${{ secrets.DINGTALK_WEBHOOK }}" >> $GITHUB_ENV
          echo "DINGTALK_SECRET=${{ secrets.DINGTALK_SECRET }}" >> $GITHUB_ENV
          
          # 修复：GitHub Actions 不支持 || 表达式，改用bash兜底
          if [ -z "${{ secrets.REPORT_BASE_URL }}" ]; then
            echo "REPORT_BASE_URL=https://brook-han.github.io/renegade-ai-Updater" >> $GITHUB_ENV
          else
            echo "REPORT_BASE_URL=${{ secrets.REPORT_BASE_URL }}" >> $GITHUB_ENV
          fi
          
          # 功能开关
          echo "ENABLE_NEWS_API=true" >> $GITHUB_ENV
          echo "ENABLE_RSS_FEEDS=true" >> $GITHUB_ENV

      # 步骤 5️⃣：配置 Git 用户身份
      - name: 🔧 Configure Git identity
        run: |
          NAME="${GIT_NAME:-renegade-ai-bot}"
          EMAIL="${GIT_EMAIL:-bot@renegade-ai.local}"
          git config --global user.name "$NAME"
          git config --global user.email "$EMAIL"
          echo "✅ Git identity: $NAME <$EMAIL>"

      # 步骤 6️⃣：运行学术雷达【关闭静默容错，报错可感知】
      - name: 🎓 Run Academic Radar
        run: |
          echo "🚀 Starting academic_radar.py..."
          python academic_radar.py --limit 15

      # 步骤 7️⃣：转换学术报告为 HTML
      - name: 🌐 Convert Academic Report to HTML
        run: |
          echo "🔄 Converting academic reports..."
          python academic_md_to_html.py || echo "⚠️ No academic report to convert"

      # 步骤 8️⃣：运行新闻雷达
      - name: 📰 Run News Radar
        run: |
          echo "🚀 Starting news_radar.py..."
          python news_radar.py --limit 20

      # 步骤 9️⃣：转换新闻报告为 HTML
      - name: 🌐 Convert News Report to HTML
        run: |
          echo "🔄 Converting news reports..."
          python news_md_to_html.py || echo "⚠️ No news report to convert"

      # 步骤 🔟：生成聚合主页
      - name: 🏠 Generate Radar Index
        run: |
          echo "🏗️ Building reports/index.html..."
          python radar_index_generator.py

      # 步骤 1️⃣1️⃣：备份变更到 main 分支
      - name: 📤 Backup to main branch
        run: |
          echo "💾 Checking for changes to backup..."
          git add reports/ *.py  # 只添加业务文件，不用git add -A避免垃圾提交
          if git diff --staged --quiet; then
            echo "✨ No new changes to backup"
          else
            git commit -m "🤖 Backup: $(date '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push origin main || echo "⚠️ Push to main failed (may be protected)"
          fi

      # 步骤 1️⃣2️⃣：【替换为官方稳定部署】部署到 GitHub Pages
      - name: 🚀 Deploy to GitHub Pages (gh-pages)
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          allow_empty_commit: false
          force_orphan: true

      # 步骤 1️⃣3️⃣：🔔 钉钉推送【修复：触发条件+按时间取最新文件】
      - name: 🔔 Send DingTalk Notification
        
        run: |
          WEBHOOK="$DINGTALK_WEBHOOK"
          SECRET="$DINGTALK_SECRET"
          BASE_URL="$REPORT_BASE_URL"

          if [ -z "$WEBHOOK" ] || [ -z "$SECRET" ]; then
            echo "⚠️ DINGTALK 配置不完整，跳过推送"
            exit 0
          fi

          # 修复：按文件修改时间取最新报告，而非文件名排序
          LATEST_MD=$(find reports -name "*_report_*.md" -type f 2>/dev/null | xargs ls -lt | head -1 | awk '{print $NF}')

          if [ -z "$LATEST_MD" ] || [ ! -f "$LATEST_MD" ]; then
            echo "⚠️ 未找到报告文件，跳过钉钉推送"
            exit 0
          fi

          echo "📤 推送报告至钉钉: $LATEST_MD"
          TYPE=$(echo "$LATEST_MD" | grep -q 'news' && echo 'news' || echo 'papers')
          
          python dingtalk.py \
            --file "$LATEST_MD" \
            --min-score 4.0 \
            --top-n 5 \
            --type "$TYPE"

      # 步骤 1️⃣4️⃣：📋 运行摘要
      - name: 📋 Run summary
        if: always()
        run: |
          echo "### 📋 运行摘要" >> $GITHUB_STEP_SUMMARY
          echo "- 🕐 触发时间: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_STEP_SUMMARY
          echo "- 🎓 学术报告文件数: $(find reports/academic -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 📰 新闻报告文件数: $(find reports/news -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏠 聚合主页: $([ -f reports/index.html ] && echo '✅ 已生成' || echo '❌ 未找到')" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 部署状态: ✅ 已自动发布到 gh-pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 公开访问链接:" >> $GITHUB_STEP_SUMMARY
          echo "  - [📊 报告主页](https://brook-han.github.io/renegade-ai-Updater/)" >> $GITHUB_STEP_SUMMARY