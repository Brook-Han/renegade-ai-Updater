# .github/workflows/daily-radar.yml
# ═══════════════════════════════════════════════════════════════
# 🤖 Renegade AI 雷达系统 · 核心流程版（暂跳过钉钉）
# ═══════════════════════════════════════════════════════════════
#
# ✅ 功能：
#   🎓 学术雷达：arXiv + Semantic Scholar 抓取 + AI 分析
#   📰 新闻雷达：RSS 抓取 + AI 分析
#   🌐 HTML 转换：Markdown → 精美网页
#   🏠 索引生成：聚合主页 + 筛选/搜索
#   🚀 自动部署：推送 reports/ 到 gh-pages 分支
#
# ❌ 暂跳过：钉钉推送（后续单独添加）
#
# 🔐 必需 Secrets（最少配置）：
#   - DEEPSEEK_API_KEY: DeepSeek API 密钥
#
# 👤 作者：Brooks Han
# 📅 版本：v1.0 (2026-05-11) · 核心流程版
# ═══════════════════════════════════════════════════════════════

name: 🤖 Daily Radar Core Run

on:
  schedule:
    - cron: '0 22 * * *'  # 每天北京时间 06:00 (UTC 22:00)
  workflow_dispatch:      # 支持手动触发测试

permissions:
  contents: write  # ✅ 必须：允许推送代码到仓库

jobs:
  radar-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # ⏱️ 30 分钟超时保护
    
    steps:
      # ─────────────────────────────────────────────────────────
      # 1️⃣ 下载代码
      # ─────────────────────────────────────────────────────────
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，便于后续推送
      
      # ─────────────────────────────────────────────────────────
      # 2️⃣ 设置 Python 环境
      # ─────────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'  # 💾 启用 pip 缓存加速依赖安装
      
      # ─────────────────────────────────────────────────────────
      # 3️⃣ 安装依赖
      # ─────────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 尝试从 requirements.txt 安装，失败则安装核心依赖
          pip install -r requirements.txt 2>/dev/null || \
          pip install arxiv requests openai python-dotenv feedparser
      
      # ─────────────────────────────────────────────────────────
      # 4️⃣ 配置环境变量（含 Git 默认值）
      # ─────────────────────────────────────────────────────────
      - name: ⚙️ Setup environment
        run: |
          # 🔐 API Keys
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> $GITHUB_ENV
          
          # ✅ Git 身份：提供硬编码默认值，避免"Author identity unknown"
          echo "GIT_NAME=${{ secrets.GIT_USER_NAME }}" >> $GITHUB_ENV
          echo "GIT_EMAIL=${{ secrets.GIT_USER_EMAIL }}" >> $GITHUB_ENV
          
          # 🌐 公开访问基础 URL（用于日志提示，非必需）
          echo "REPORT_BASE_URL=${{ secrets.REPORT_BASE_URL || 'https://brook-han.github.io/renegade-ai-Updater/reports' }}" >> $GITHUB_ENV
      
      # ─────────────────────────────────────────────────────────
      # 5️⃣ 配置 Git 用户（✅ 关键：空值时使用默认值）
      # ─────────────────────────────────────────────────────────
      - name: 🔧 Configure Git identity
        run: |
          # 🛡️ 如果 Secrets 为空，使用默认值
          NAME="${GIT_NAME:-renegade-ai-bot}"
          EMAIL="${GIT_EMAIL:-bot@renegade-ai.local}"
          
          git config --global user.name "$NAME"
          git config --global user.email "$EMAIL"
          
          echo "✅ Git identity: $NAME <$EMAIL>"
      
      # ─────────────────────────────────────────────────────────
      # 6️⃣ 运行学术雷达
      # ─────────────────────────────────────────────────────────
      - name: 🎓 Run Academic Radar
        run: |
          echo "🚀 Starting academic_radar.py..."
          python academic_radar.py --limit 15
        continue-on-error: true  # ✅ 失败也不中断后续步骤
      
      # ─────────────────────────────────────────────────────────
      # 7️⃣ 转换学术报告为 HTML
      # ─────────────────────────────────────────────────────────
      - name: 🌐 Convert Academic Report to HTML
        run: |
          echo "🔄 Converting academic reports..."
          python academic_md_to_html.py || echo "⚠️ No academic report to convert"
      
      # ─────────────────────────────────────────────────────────
      # 8️⃣ 运行新闻雷达
      # ─────────────────────────────────────────────────────────
      - name: 📰 Run News Radar
        run: |
          echo "🚀 Starting news_radar.py..."
          python news_radar.py --limit 20
        continue-on-error: true
      
      # ─────────────────────────────────────────────────────────
      # 9️⃣ 转换新闻报告为 HTML
      # ─────────────────────────────────────────────────────────
      - name: 🌐 Convert News Report to HTML
        run: |
          echo "🔄 Converting news reports..."
          python news_md_to_html.py || echo "⚠️ No news report to convert"
      
      # ─────────────────────────────────────────────────────────
      # 🔟 生成聚合主页（index.html）
      # ─────────────────────────────────────────────────────────
      - name: 🏠 Generate Radar Index
        run: |
          echo "🏗️ Building reports/index.html..."
          python radar_index_generator.py
      
      # ─────────────────────────────────────────────────────────
      # 1️⃣1️⃣ 提交更改到 main 分支（可选，用于备份）
      # ─────────────────────────────────────────────────────────
      - name: 📤 Backup to main branch
        run: |
          echo "💾 Checking for changes to backup..."
          git add -A
          
          if git diff --staged --quiet; then
            echo "✨ No new changes to backup"
          else
            # 再次确认身份（双重保险）
            git config --global user.name "${GIT_NAME:-renegade-ai-bot}"
            git config --global user.email "${GIT_EMAIL:-bot@renegade-ai.local}"
            
            git commit -m "🤖 Backup: $(date '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push origin main || echo "⚠️ Push to main failed (may be protected)"
          fi
      
      # ─────────────────────────────────────────────────────────
      # 1️⃣2️⃣ 🚀 部署到 GitHub Pages (gh-pages 分支) ✅ 核心步骤
      # ─────────────────────────────────────────────────────────
      - name: 🚀 Deploy to GitHub Pages (gh-pages)
        if: success()  # 仅当前面步骤都成功时执行
        run: |
          echo "📦 Preparing deployment to gh-pages branch..."
          
          # 配置 Git 身份
          git config --global user.name "${GIT_NAME:-renegade-ai-bot}"
          git config --global user.email "${GIT_EMAIL:-bot@renegade-ai.local}"
          
          # 创建或切换到 gh-pages 分支
          git checkout -b gh-pages 2>/dev/null || git checkout gh-pages
          
          # 🧹 清理旧内容（只保留 reports/ 目录）
          git rm -rf . 2>/dev/null || true
          
          # 📁 从 main 分支拉取最新的 reports/ 目录
          git checkout main -- reports/
          
          # ✅ 可选：复制 index.html 到根目录，让主页直接可访问
          # 如果希望访问 https://xxx.github.io/repo/ 就直接看到雷达主页，取消下面注释：
          cp reports/index.html ./index.html 2>/dev/null || true
          git add index.html
          
          # 📤 提交并推送
          git add reports/
          git commit -m "🤖 Deploy reports: $(date '+%Y-%m-%d %H:%M UTC') [skip ci]" || exit 0
          git push origin gh-pages -f
          
          # 🎉 输出公开访问链接
          echo ""
          echo "✅ Deployment complete!"
          echo "🌐 Public URLs:"
          echo "   🏠 Root:      https://brook-han.github.io/renegade-ai-Updater/"
          echo "   🏠 Index:     https://brook-han.github.io/renegade-ai-Updater/reports/index.html"
          echo "   📰 News:      https://brook-han.github.io/renegade-ai-Updater/reports/news/"
          echo "   🎓 Academic:  https://brook-han.github.io/renegade-ai-Updater/reports/academic/"
          echo ""
      
      # ─────────────────────────────────────────────────────────
      # 1️⃣3️⃣ 运行摘要（显示在 Actions 页面底部）
      # ─────────────────────────────────────────────────────────
      - name: 📋 Run summary
        if: always()
        run: |
          echo "### 📋 运行摘要" >> $GITHUB_STEP_SUMMARY
          echo "- 🕐 触发时间: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_STEP_SUMMARY
          echo "- 🎓 学术报告: $(find reports/academic -name '*.html' 2>/dev/null | wc -l) 个" >> $GITHUB_STEP_SUMMARY
          echo "- 📰 新闻报告: $(find reports/news -name '*.html' 2>/dev/null | wc -l) 个" >> $GITHUB_STEP_SUMMARY
          echo "- 🏠 聚合主页: $([ -f reports/index.html ] && echo '✅ 已生成' || echo '❌ 未找到')" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 部署状态: $([ -d .git ] && echo '✅ 已推送到 gh-pages' || echo '⏳ 等待构建')" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "- 🔗 公开访问（等待 1-2 分钟构建完成）:"
          echo "  - [🏠 聚合主页](https://brook-han.github.io/renegade-ai-Updater/reports/index.html)"
          echo "  - [📰 新闻目录](https://brook-han.github.io/renegade-ai-Updater/reports/news/)"
          echo "  - [🎓 学术目录](https://brook-han.github.io/renegade-ai-Updater/reports/academic/)"

      - name: 钉钉推送
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          REPORT_BASE_URL: "https://Brook-Han.github.io/renegade-ai-Updater"
        run: python dingtalk.py --type news
