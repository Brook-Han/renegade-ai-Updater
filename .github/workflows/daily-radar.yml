# ═══════════════════════════════════════════════════════════════
# 🤖 Renegade AI 雷达系统 · GitHub Actions 工作流（完整修复版）2026-05-12
# ═══════════════════════════════════════════════════════════════
name: 🤖 Daily Radar Auto-Run
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 22 * * *'          # 每天北京时间 06:00
  workflow_dispatch:               # 手动触发

permissions:
  contents: write
  pages: write

jobs:
  radar-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || \
          pip install arxiv requests openai python-dotenv feedparser markdown jinja2

      - name: ⚙️ Setup environment
        run: |
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> $GITHUB_ENV
          echo "GIT_NAME=${{ secrets.GIT_USER_NAME }}" >> $GITHUB_ENV
          echo "GIT_EMAIL=${{ secrets.GIT_USER_EMAIL }}" >> $GITHUB_ENV
          echo "DINGTALK_WEBHOOK=${{ secrets.DINGTALK_WEBHOOK }}" >> $GITHUB_ENV
          echo "DINGTALK_SECRET=${{ secrets.DINGTALK_SECRET }}" >> $GITHUB_ENV
          echo "REPORT_BASE_URL=https://brook-han.github.io/renegade-ai-Updater" >> $GITHUB_ENV
          echo "ENABLE_NEWS_API=true" >> $GITHUB_ENV
          echo "ENABLE_RSS_FEEDS=true" >> $GITHUB_ENV

      - name: 🔧 Configure Git identity
        run: |
          NAME="${GIT_NAME:-renegade-ai-bot}"
          EMAIL="${GIT_EMAIL:-bot@renegade-ai.local}"
          git config --global user.name "$NAME"
          git config --global user.email "$EMAIL"
          echo "✅ Git identity: $NAME <$EMAIL>"

      - name: 🎓 Run Academic Radar
        run: |
          echo "🚀 Starting academic_radar.py..."
          python academic_radar.py --limit 10
        continue-on-error: true

      - name: 🌐 Convert Academic Report to HTML
        run: |
          echo "🔄 Converting academic reports..."
          python academic_md_to_html.py || echo "⚠️ No academic report to convert"

      - name: 📰 Run News Radar
        run: |
          echo "🚀 Starting news_radar.py..."
          python news_radar.py --limit 50
        continue-on-error: true

      - name: 🌐 Convert News Report to HTML
        run: |
          echo "🔄 Converting news reports..."
          python news_md_to_html.py || echo "⚠️ No news report to convert"

      # ─────────────────────────────────────────────────────────
      # 🔧 生成主页（每日摘要）
      # ─────────────────────────────────────────────────────────
      - name: 🏠 Generate Radar Index
        run: |
          echo "🏗️ Building docs/index.html..."
          python radar_index_generator.py

      # ─────────────────────────────────────────────────────────
      # 🔧 生成新闻完整列表页
      # ─────────────────────────────────────────────────────────
      - name: 📰 Generate News Archive
        run: |
          echo "📰 Building docs/news/index.html..."
          python generate_news_index.py || echo "⚠️ No news files found"

      # ─────────────────────────────────────────────────────────
      # 🔧 生成学术论文完整列表页
      # ─────────────────────────────────────────────────────────
      - name: 🎓 Generate Academic Archive
        run: |
          echo "🎓 Building docs/academic/index.html..."
          python generate_academic_index.py || echo "⚠️ No academic files found"

      - name: 📤 Backup to main branch
        run: |
          echo "💾 Checking for changes to backup..."
          git add docs/ *.py
          if git diff --staged --quiet; then
            echo "✨ No new changes to backup"
          else
            git config --global user.name "${GIT_NAME:-renegade-ai-bot}"
            git config --global user.email "${GIT_EMAIL:-bot@renegade-ai.local}"
            git commit -m "🤖 Backup: $(date '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push origin main || echo "⚠️ Push to main failed (may be protected)"
          fi

      - name: 🚀 Deploy to GitHub Pages (gh-pages)
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: main
          force_orphan: true
          exclude_assets: '.github'

      - name: 🔔 Push News Report to DingTalk
        run: |
          echo "📤 推送新闻报告至钉钉..."
          python dingtalk.py --type news
        continue-on-error: true

      - name: 🔔 Push Academic Report to DingTalk
        run: |
          echo "📤 推送学术报告至钉钉..."
          python dingtalk.py --type papers
        continue-on-error: true

      - name: 📋 Run summary
        if: always()
        run: |
          echo "### 📋 运行摘要" >> $GITHUB_STEP_SUMMARY
          echo "- 🕐 触发时间: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_STEP_SUMMARY
          echo "- 🎓 学术报告文件数: $(find docs/academic -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 📰 新闻报告文件数: $(find docs/news -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏠 聚合主页: $([ -f docs/index.html ] && echo '✅ 已生成' || echo '❌ 未找到')" >> $GITHUB_STEP_SUMMARY
          echo "- 📰 新闻列表页: $([ -f docs/news/index.html ] && echo '✅ 已生成' || echo '❌ 未找到')" >> $GITHUB_STEP_SUMMARY
          echo "- 🎓 论文列表页: $([ -f docs/academic/index.html ] && echo '✅ 已生成' || echo '❌ 未找到')" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 部署状态: ✅ 已自动发布到 gh-pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 公开访问链接:" >> $GITHUB_STEP_SUMMARY
          echo "  - [📊 报告主页](https://brook-han.github.io/renegade-ai-Updater/)" >> $GITHUB_STEP_SUMMARY
          echo "  - [📰 新闻列表](https://brook-han.github.io/renegade-ai-Updater/news/)" >> $GITHUB_STEP_SUMMARY
          echo "  - [🎓 论文列表](https://brook-han.github.io/renegade-ai-Updater/academic/)" >> $GITHUB_STEP_SUMMARY