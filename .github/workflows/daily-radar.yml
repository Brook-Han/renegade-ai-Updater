# ═══════════════════════════════════════════════════════════════
# 📰 新闻雷达 · 每日自动扫描（独立版）
# ═══════════════════════════════════════════════════════════════
# 每日 06:00 CST 自动运行，新闻完成即推送+通知。
# 学术雷达请见 academic-weekly.yml（每周一）
# ═══════════════════════════════════════════════════════════════
name: 📰 News Radar Daily

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 22 * * *'          # 每日 北京时间 06:00
  workflow_dispatch:
    inputs:
      skip_notify:
        description: '跳过通知推送'
        type: boolean
        default: false
      dry_run_notify:
        description: '通知演习模式（预览不发送）'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: radar-news-${{ github.repository }}
  cancel-in-progress: false

jobs:
  news-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 环境准备 ──────────────────────────────────────────
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || \
          pip install arxiv requests openai python-dotenv feedparser markdown jinja2

      - name: ⚙️ Setup environment
        run: |
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> $GITHUB_ENV
          echo "GIT_NAME=${{ secrets.GIT_USER_NAME }}" >> $GITHUB_ENV
          echo "GIT_EMAIL=${{ secrets.GIT_USER_EMAIL }}" >> $GITHUB_ENV
          echo "DINGTALK_WEBHOOK=${{ secrets.DINGTALK_WEBHOOK }}" >> $GITHUB_ENV
          echo "DINGTALK_SECRET=${{ secrets.DINGTALK_SECRET }}" >> $GITHUB_ENV
          echo "REPORT_BASE_URL=https://brook-han.github.io/renegade-ai-Updater" >> $GITHUB_ENV
          echo "ENABLE_NEWS_API=true" >> $GITHUB_ENV
          echo "ENABLE_RSS_FEEDS=true" >> $GITHUB_ENV
          echo "NOTIFY_TELEGRAM_BOT_TOKEN=${{ secrets.NOTIFY_TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "NOTIFY_TELEGRAM_CHAT_ID=${{ secrets.NOTIFY_TELEGRAM_CHAT_ID }}" >> $GITHUB_ENV

      - name: 🔧 Configure Git identity
        run: |
          NAME="${GIT_NAME:-renegade-ai-bot}"
          EMAIL="${GIT_EMAIL:-bot@renegade-ai.local}"
          git config --global user.name "$NAME"
          git config --global user.email "$EMAIL"
          # 清理可能残留的冲突状态（来自上一轮中断的 rebase）
          git rebase --abort 2>/dev/null; git merge --abort 2>/dev/null; true
          echo "✅ Git identity: $NAME <$EMAIL>"

      # ── 新闻雷达 ──────────────────────────────────────────
      - name: 📰 Run News Radar
        run: |
          echo "🚀 Starting news_radar.py..."
          python news_radar.py --limit 50
        continue-on-error: true

      - name: 🌐 Convert News Report to HTML
        run: |
          echo "🔄 Converting news reports..."
          python news_md_to_html.py || echo "⚠️ No news report to convert"

      # ── 新闻即时备份+通知（不等索引，先存好） ────────────
      - name: 💾 Git Backup News
        run: |
          echo "💾 立即保存新闻报告 + 搜索缓存..."
          mkdir -p cache/search_results
          git add docs/news/ cache/
          if git diff --staged --quiet; then
            echo "✨ 新闻无新变更"
          else
            git commit -m "📰 News: $(date '+%Y-%m-%d') [skip ci]"
            git pull --rebase -X theirs --no-edit origin main || git rebase --abort
            git push origin main || echo "⚠️ News push failed"
          fi

      - name: 🔔 Push News to Notify
        if: ${{ !inputs.skip_notify }}
        run: |
          if [ "${{ inputs.dry_run_notify }}" = "true" ]; then
            echo "🔍 DRY-RUN 模式"
            python -m notify --type news --dry-run
          else
            echo "📤 推送新闻报告..."
            python -m notify --type news
          fi
        continue-on-error: true

      # ── 索引页生成 ────────────────────────────────────────
      - name: 🏠 Generate Radar Index
        run: |
          echo "🏗️ Building docs/index.html..."
          python radar_index_generator.py

      - name: 📰 Generate News Archive
        run: |
          echo "📰 Building docs/news/index.html..."
          python generate_news_index.py || echo "⚠️ No news files found"

      # ── 最终备份（包含索引页更新） ────────────────────────
      - name: 📤 Backup Index
        run: |
          echo "💾 保存索引页..."
          git add docs/index.html docs/news/index.html
          if git diff --staged --quiet; then
            echo "✨ 索引无新变更"
          else
            git commit -m "🏠 Index: $(date '+%Y-%m-%d') [skip ci]"
            git pull --rebase -X theirs --no-edit origin main || git rebase --abort
            git push origin main || echo "⚠️ Index push failed"
          fi

      # ── 运行摘要 ──────────────────────────────────────────
      - name: 📋 Run summary
        if: always()
        run: |
          echo "### 📋 新闻雷达运行摘要" >> $GITHUB_STEP_SUMMARY
          echo "- 🕐 触发时间: $(date '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_STEP_SUMMARY
          echo "- 📰 新闻报告文件数: $(find docs/news -name '*.html' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏠 聚合主页: $([ -f docs/index.html ] && echo '✅ 已生成' || echo '❌ 未找到')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 公开访问链接:" >> $GITHUB_STEP_SUMMARY
          echo "  - [📊 报告主页](https://brook-han.github.io/renegade-ai-Updater/)" >> $GITHUB_STEP_SUMMARY
          echo "  - [📰 新闻列表](https://brook-han.github.io/renegade-ai-Updater/news/)" >> $GITHUB_STEP_SUMMARY
