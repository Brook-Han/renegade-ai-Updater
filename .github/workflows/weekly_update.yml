name: Renegade AI 每周文献监控

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5          # ← v4 → v5

      - name: 设置 Python
        uses: actions/setup-python@v6      # ← v5 → v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行文献监控
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py

      - name: 上传报告
        uses: actions/upload-artifact@v6          # ← v4 → v6
        with:
          name: literature-report
          path: reports/