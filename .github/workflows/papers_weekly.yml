name: Paper Radar Weekly

on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一 UTC 03:00
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行论文雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --papers

      - name: 提交并推送报告
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          # ====================== 🔥 核心修复：彻底清理所有缓存/日志/临时文件 ======================
          # 丢弃所有日志、缓存、编译文件（解决 Git 冲突的终极方案）
          git checkout -- . || true
          # 强制删除所有被 .gitignore 忽略的缓存文件
          rm -f radar.log *.json logs/* __pycache__/* cache/* 2>/dev/null || true

          # 同步远程代码（无任何本地修改，100% 不报错）
          git pull --rebase origin main

          # 添加并提交报告文件
          REPORT_FILES=$(find reports/ -maxdepth 1 -name "papers_report_multi_*.md" 2>/dev/null)
          if [ -n "$REPORT_FILES" ]; then
              git add $REPORT_FILES
              git commit -m "Weekly paper report" || echo "No changes to commit"
          else
              echo "ℹ️ 没有匹配的报告文件，跳过提交"
          fi

          # 重试推送
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break || sleep 10
          done

      - name: 推送论文简报到钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python notify_dingtalk.py --type papers