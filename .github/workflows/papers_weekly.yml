name: Paper Radar Weekly

on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一 UTC 03:00
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-papers:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行论文雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --papers

      - name: 提交并推送报告
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git stash push --include-untracked -m "temp-stash"
          git pull --rebase origin main
          git stash pop || true

          REPORT_FILES=$(find reports/ -maxdepth 1 -name "papers_report_multi_*.md" 2>/dev/null)

          if [ -n "$REPORT_FILES" ]; then
              git add reports/papers_report_multi_*.md
              git commit -m "Weekly paper report" || echo "No changes to commit"
          else
              echo "ℹ️ 没有匹配的报告文件，跳过提交"
          fi

          for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 10
          done

      - name: 推送紧急警报到钉钉（可选）
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          LATEST=$(ls -t reports/papers_report_multi_*.md 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
              python notify_dingtalk.py "$LATEST"
          fi