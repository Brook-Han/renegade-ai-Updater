name: Paper Radar Weekly

on:
  schedule:
    - cron: '0 3 * * 1'      # 每周一 UTC 03:00
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 拉取仓库代码（含历史报告和缓存）
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. 配置 Python 环境
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # 3. 安装依赖
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 同步远程仓库，避免之后的提交冲突
      - name: 同步远程仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main

      # 5. 抓取 + AI 分析 + 生成报告（MD + HTML）
      - name: 运行论文雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --papers

      # 6. 拿到“刚刚生成的那份 HTML 报告”的准确文件名
      - name: 确定最新报告文件名
        id: latest
        run: |
          # 用 ls -t 按修改时间排序，取今天日期前缀里最新的 .html（刚生成的）
          LATEST_HTML=$(ls -t reports/papers_report_multi_$(date +%Y-%m-%d)_*.html 2>/dev/null | head -1)
          LATEST_MD="${LATEST_HTML%.html}.md"
          echo "latest_html=$LATEST_HTML" >> $GITHUB_OUTPUT
          echo "latest_md=$LATEST_MD" >> $GITHUB_OUTPUT
          echo "📌 最新报告: $LATEST_HTML"

      # 7. 生成主页（index.html），并传入最新报告，确保链接准确
      - name: 生成存档索引页
        run: |
          python generate_archive.py --latest "${{ steps.latest.outputs.latest_html }}"

      # 8. 把所有新文件提交到 main 分支
      - name: 提交报告、缓存与索引
        run: |
          git add -f reports/papers_*.md reports/papers_*.html reports/paper_cache.json reports/index.html
          git commit -m "📚 Add weekly paper report, cache, and index" || true
          git push origin main

      # 9. 部署到 GitHub Pages（live 分支）
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: live
          keep_files: false
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # 10. 向钉钉推送刚刚生成的报告（不再让脚本自己猜）
      - name: 推送钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          REPORT_BASE_URL: "https://Brook-Han.github.io/renegade-ai-Updater"
        run: |
          # 使用上一步精确锁定的 MD 文件
          python notify_dingtalk.py --type papers --file "${{ steps.latest.outputs.latest_md }}"