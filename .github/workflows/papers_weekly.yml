name: Paper Radar Weekly

on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一 UTC 03:00
  workflow_dispatch:

concurrency:
  group: repo-push-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ========== 新增：恢复论文缓存 ==========
      - name: 恢复论文分析缓存
        uses: actions/cache@v4
        with:
          path: paper_cache.json
          key: paper-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            paper-cache-${{ runner.os }}-

      - name: 运行论文雷达（抓取 + 分析 + 生成 MD + HTML）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scrape_and_analyze.py --papers

      # 提交报告... (后续不变)
      - name: 提交报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git clean -fd -e reports
          git pull --rebase --autostash origin main
          git add reports/papers_*.md reports/papers_*.html reports/paper_cache.json 2>/dev/null || true
          git add reports/papers_*.md reports/papers_*.html 2>/dev/null || true
          git commit -m "📚 Add weekly paper report and cache" || true
          git push origin main

      - name: 部署到 GitHub Pages (live 分支)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: live
          keep_files: false
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 推送论文简报到钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          REPORT_BASE_URL: "https://Brook-Han.github.io/renegade-ai-Updater"
        run: python notify_dingtalk.py --type papers